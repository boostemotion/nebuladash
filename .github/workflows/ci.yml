name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit tracked public files
        shell: bash
        run: |
          forbidden="$(
            git ls-files |
              grep -E '(^|/)(\.env($|\.)|\.npmrc$|\.omx/|node_modules/|dist/|\.pnpm-store/)|\.(zip|tar\.gz|bak|tmp|pem|key|p12|pfx)$' ||
              true
          )"

          if [ -n "${forbidden}" ]; then
            echo "Forbidden tracked files:"
            echo "${forbidden}"
            exit 1
          fi

      - name: Lint
        run: pnpm exec eslint .

      - name: Test
        run: pnpm test

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build
